<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请刷量工具 v2.0 - Web版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e2937);
        }

        .log-container {
            font-family: 'Consolas', monospace;
            scrollbar-width: thin;
        }

        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
    </style>
</head>

<body class="text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🎯 邀请刷量工具 v2.0</h1>
            <p class="text-gray-400">多轮重试 · 自动继续 · 手动补刷</p>
        </div>

        <!-- 设置区域 -->
        <div class="bg-slate-800 rounded-2xl p-8 shadow-xl mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">邀请码</label>
                    <input id="refer_code" value="NZR6STU0"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">选择套餐</label>
                    <select id="package" onchange="updateCount()"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
                        <option value="0">自定义数量</option>
                        <option value="1">1 人 → 15 金币</option>
                        <option value="2">2 人 → 3 天VIP</option>
                        <option value="3">5 人 → 8 天VIP</option>
                        <option value="4">8 人 → 2 次AI脱衣</option>
                        <option value="5">10 人 → 2 次AI图片换脸</option>
                        <option value="6">15 人 → 45 金币</option>
                        <option value="7">20 人 → 45 天VIP</option>
                        <option value="8">50 人 → 80 天VIP</option>
                        <option value="9">100 人 → 180 天VIP</option>
                        <option value="10">200 人 → 1000 金币</option>
                    </select>
                </div>
            </div>

            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">目标邀请数量</label>
                <input id="count" type="number" value="100" min="1" max="99999"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            </div>

            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">并发线程数 (推荐 15-25)</label>
                <input id="workers" type="number" value="20" min="1" max="100"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            </div>

            <button onclick="startTask()" id="startBtn"
                class="mt-8 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-xl text-lg transition-all active:scale-95">
                🚀 开始执行任务
            </button>
        </div>

        <!-- 执行状态面板 -->
        <div id="statusPanel" class="hidden bg-slate-800 rounded-2xl p-8 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold flex items-center gap-2">
                    执行进度
                    <span id="roundInfo" class="text-sm text-gray-400">(第 <span id="roundNum">1</span> 轮)</span>
                </h3>
                <span id="statusText"
                    class="px-4 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm font-medium">运行中</span>
            </div>

            <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden mb-3">
                <div id="progressBar" class="progress-bar h-full bg-gradient-to-r from-green-400 to-emerald-500 w-0">
                </div>
            </div>

            <div class="flex justify-between text-sm mb-6">
                <span class="text-gray-400">
                    成功 <span id="successCount" class="text-green-400 font-bold">0</span>
                    / <span id="totalCount">0</span>
                </span>
                <span id="percentage" class="font-medium">0%</span>
            </div>

            <!-- 日志区域 -->
            <div id="logContainer"
                class="bg-slate-950 rounded-xl p-4 h-80 overflow-y-auto log-container text-sm text-gray-300 border border-slate-800">
            </div>

            <div class="mt-6 flex gap-3" id="buttonGroup">
                <button onclick="stopTask()" id="stopBtn"
                    class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-medium transition-colors">
                    ⛔ 停止任务
                </button>

                <button onclick="continueTask()" id="continueBtn"
                    class="flex-1 bg-amber-600 hover:bg-amber-700 py-3 rounded-xl font-medium transition-colors hidden">
                    🔄 继续刷剩余
                </button>

                <button onclick="resetUI()"
                    class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-medium transition-colors">
                    🔄 重置界面
                </button>
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;

        function updateCount() {
            const pkg = document.getElementById('package').value;
            const countMap = { "1": 1, "2": 2, "3": 5, "4": 8, "5": 10, "6": 15, "7": 20, "8": 50, "9": 100, "10": 200 };
            if (pkg !== "0") document.getElementById('count').value = countMap[pkg];
        }

        function addLog(message) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });

            let color = 'text-gray-300';
            if (message.includes('✅') || message.includes('🎉') || message.includes('成功') || message.includes('达成')) color = 'text-green-400';
            if (message.includes('❌') || message.includes('失败') || message.includes('500')) color = 'text-red-400';
            if (message.includes('第') && message.includes('轮')) color = 'text-blue-400';

            container.innerHTML += `<div class="py-1 ${color}">[${time}] ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        function startTask() {
            const referCode = document.getElementById('refer_code').value.trim() || "NZR6STU0";
            const count = parseInt(document.getElementById('count').value);
            const workers = parseInt(document.getElementById('workers').value);

            if (count < 1) return alert("请输入有效的目标数量！");

            // 重置界面
            document.getElementById('startBtn').disabled = true;
            document.getElementById('statusPanel').classList.remove('hidden');
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('continueBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');

            addLog("🚀 任务启动中...");

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refer_code: referCode, count: count, workers: workers })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') connectSSE();
                    else {
                        alert(data.msg || "启动失败");
                        document.getElementById('startBtn').disabled = false;
                    }
                })
                .catch(() => {
                    alert("连接失败");
                    document.getElementById('startBtn').disabled = false;
                });
        }

        function connectSSE() {
            if (eventSource) eventSource.close();

            eventSource = new EventSource('/status');
            eventSource.onmessage = function (e) {
                const data = JSON.parse(e.data);

                document.getElementById('successCount').textContent = data.success;
                document.getElementById('totalCount').textContent = data.total;
                document.getElementById('roundNum').textContent = data.round || 1;

                const percent = data.total > 0 ? Math.round((data.success / data.total) * 100) : 0;
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('percentage').textContent = percent + '%';

                if (data.logs) {
                    data.logs.forEach(log => {
                        if (log && !document.getElementById('logContainer').innerHTML.includes(log.slice(0, 40))) {
                            addLog(log);
                        }
                    });
                }

                if (!data.running) {
                    const successCount = parseInt(data.success);
                    const total = parseInt(data.total);
                    const statusEl = document.getElementById('statusText');

                    document.getElementById('stopBtn').classList.add('hidden');

                    if (successCount >= total) {
                        statusEl.textContent = '🎉 已达成目标';
                        statusEl.className = 'px-4 py-1 rounded-full bg-green-500/20 text-green-400 text-sm font-medium';
                    } else {
                        statusEl.textContent = '⏹️ 已停止';
                        statusEl.className = 'px-4 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm font-medium';
                        if (successCount < total) {
                            document.getElementById('continueBtn').classList.remove('hidden');
                        }
                    }
                    eventSource.close();
                    document.getElementById('startBtn').disabled = false;
                }
            };
        }

        function continueTask() {
            const total = parseInt(document.getElementById('totalCount').textContent);
            const success = parseInt(document.getElementById('successCount').textContent);
            const remaining = total - success;
            if (remaining <= 0) return;

            addLog(`🔄 继续刷剩余 ${remaining} 个...`);
            document.getElementById('continueBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    refer_code: document.getElementById('refer_code').value.trim() || "NZR6STU0",
                    count: remaining,
                    workers: parseInt(document.getElementById('workers').value)
                })
            }).then(r => r.json()).then(() => connectSSE());
        }

        function stopTask() {
            if (eventSource) eventSource.close();
            document.getElementById('statusText').textContent = '⛔ 已手动停止';
            document.getElementById('statusText').className = 'px-4 py-1 rounded-full bg-red-500/20 text-red-400 text-sm font-medium';
        }

        function resetUI() {
            if (eventSource) eventSource.close();
            location.reload();
        }

        window.onload = updateCount;
    </script>
</body>

</html>
